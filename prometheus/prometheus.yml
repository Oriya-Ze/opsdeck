global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: opsdeck
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: node_exporter
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/nodes.json
        refresh_interval: 60s
