name: CI/CD
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker compose up
        run: docker compose up -d --build --wait --wait-timeout 120

      - name: Smoke test backend
        run: curl -fsS "http://localhost:8000/api/health"

      - name: Smoke test runtime config
        run: curl -fsS "http://localhost:8000/api/runtime"

      - name: Smoke test frontend
        run: curl -fsS "http://localhost:3000"

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Docker compose down
        if: always()
        run: docker compose down -v

  push-dockerhub:
    needs: smoke
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: backend/
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/opsdeck-backend:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/opsdeck-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: frontend/
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/opsdeck-frontend:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/opsdeck-frontend:latest

  push-ecr:
    needs: smoke
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend to ECR
        uses: docker/build-push-action@v7
        with:
          context: backend/
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/opsdeck/backend:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/opsdeck/backend:latest

      - name: Build and push frontend to ECR
        uses: docker/build-push-action@v7
        with:
          context: frontend/
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/opsdeck/frontend:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/opsdeck/frontend:latest
