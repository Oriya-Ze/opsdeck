services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opsdeck}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opsdeck}
      POSTGRES_DB: ${POSTGRES_DB:-opsdeck}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opsdeck} -d ${POSTGRES_DB:-opsdeck}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTH_MODE: ${AUTH_MODE:-disabled}
      DATABASE_URL: ${DATABASE_URL:-postgresql://opsdeck:opsdeck@postgres:5432/opsdeck}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-opsdeck-dev-key-change-in-production-32b=}
      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      BACKUP_LOCAL_DIR: ${BACKUP_LOCAL_DIR:-/app/backups}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      S3_BACKUP_PREFIX: ${S3_BACKUP_PREFIX:-backups/}
      PROMETHEUS_ENABLED: ${PROMETHEUS_ENABLED:-true}
      PROMETHEUS_FILE_SD_DIR: ${PROMETHEUS_FILE_SD_DIR:-/app/prometheus/file_sd}
      PROMETHEUS_INTERNAL_URL: ${PROMETHEUS_INTERNAL_URL:-http://prometheus:9090}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://localhost:9090}
      GRAFANA_URL: ${GRAFANA_URL:-http://localhost:3001}
      GRAFANA_EMBED_URL: ${GRAFANA_EMBED_URL:-http://localhost:3001/d/opsdeck-overview/opsdeck-overview?orgId=1&theme=dark&kiosk}
    volumes:
      - ./prometheus/file_sd:/app/prometheus/file_sd
      - ./backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as u; u.urlopen('http://127.0.0.1:8000/api/ready', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/file_sd:/etc/prometheus/file_sd:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-opsdeck}
      GF_USERS_DEFAULT_THEME: dark
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
