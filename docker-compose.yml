services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: opsdeck
      POSTGRES_PASSWORD: opsdeck
      POSTGRES_DB: opsdeck
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opsdeck -d opsdeck"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://opsdeck:opsdeck@postgres:5432/opsdeck
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
      ENCRYPTION_KEY: opsdeck-dev-key-change-in-production-32b=
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
