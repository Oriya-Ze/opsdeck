apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opsdeck.backend.fullname" . }}
  labels:
    {{- include "opsdeck.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "opsdeck.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "opsdeck.backend.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "opsdeck.postgresql.fullname" . }} {{ .Values.postgresql.service.port }}; do
                echo "waiting for postgresql..."
                sleep 2
              done
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.service.port }}
              protocol: TCP
          env:
            - name: DATABASE_URL
              {{- if .Values.secrets.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: database-url
              {{- else }}
              value: {{ include "opsdeck.databaseUrl" . | quote }}
              {{- end }}
            - name: ENCRYPTION_KEY
              {{- if .Values.secrets.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: encryption-key
              {{- else }}
              value: {{ .Values.secrets.encryptionKey | quote }}
              {{- end }}
            {{- range $key, $value := .Values.backend.env }}
            {{- if not (and (eq $key "BACKUP_LOCAL_DIR") (eq ($.Values.backend.env.STORAGE_TYPE | default "local") "s3")) }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
          {{- with .Values.backend.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if and .Values.backend.backupStorage.enabled (eq (.Values.backend.env.STORAGE_TYPE | default "local") "local") }}
          volumeMounts:
            - name: backups
              mountPath: {{ .Values.backend.backupStorage.mountPath }}
          {{- end }}
      {{- if and .Values.backend.backupStorage.enabled (eq (.Values.backend.env.STORAGE_TYPE | default "local") "local") }}
      volumes:
        - name: backups
          persistentVolumeClaim:
            claimName: {{ include "opsdeck.backend.fullname" . }}-backups
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
