apiVersion: v1
kind: Pod
metadata:
  name: {{ include "opsdeck.fullname" . }}-test-backend
  labels:
    {{- include "opsdeck.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command: ["wget", "-qO-", "http://{{ include "opsdeck.backend.fullname" . }}:{{ .Values.backend.service.port }}/api/health"]
